<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>商品写真登録 - FLAT発注システム</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans JP", sans-serif; }
    .product-row.selected { background-color: #fef3c7; border-color: #d97706; }
  </style>
</head>
<body class="bg-amber-50/40 text-slate-800 min-h-screen flex flex-col pb-28">

  <header class="bg-amber-700 text-white shadow-md sticky top-0 z-40">
    <div class="px-4 py-3 flex items-center gap-2">
      <i class="fa-solid fa-camera text-xl text-amber-300"></i>
      <h1 class="font-bold text-base tracking-wide">商品写真登録</h1>
    </div>
  </header>

  <!-- 権限なし・読み込み中・エラー表示 -->
  <div id="status-area" class="max-w-lg w-full mx-auto px-4 py-10 text-center text-slate-400 text-sm">
    <div class="animate-spin rounded-full h-8 w-8 border-2 border-amber-500 border-t-transparent mx-auto mb-3"></div>
    読み込んでいます...
  </div>

  <!-- メイン画面（権限確認OK後に表示） -->
  <div id="main-area" class="hidden max-w-lg w-full mx-auto px-4 py-4 space-y-4 flex-1">

    <!-- STEP1: 商品を選ぶ -->
    <section class="bg-white p-4 rounded-2xl shadow-sm border border-amber-100 space-y-3">
      <h2 class="font-bold text-amber-900 flex items-center gap-2 text-sm border-b border-amber-100 pb-2">
        <span class="w-5 h-5 rounded-full bg-amber-600 text-white text-[11px] flex items-center justify-center font-bold shrink-0">1</span>
        商品を選ぶ
      </h2>
      <input id="search-input" type="text" placeholder="商品名・商品コードで検索"
        class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500 placeholder:text-slate-400">
      <div id="product-list" class="max-h-64 overflow-y-auto space-y-1.5 pr-1"></div>
      <div id="selected-product-label" class="text-xs text-amber-700 font-bold hidden pt-1">
        <i class="fa-solid fa-circle-check mr-1"></i><span></span>
      </div>
    </section>

    <!-- STEP2: 写真を撮る/選ぶ -->
    <section class="bg-white p-4 rounded-2xl shadow-sm border border-amber-100 space-y-3">
      <h2 class="font-bold text-amber-900 flex items-center gap-2 text-sm border-b border-amber-100 pb-2">
        <span class="w-5 h-5 rounded-full bg-amber-600 text-white text-[11px] flex items-center justify-center font-bold shrink-0">2</span>
        写真を撮る・選ぶ
      </h2>

      <div id="preview-area" class="hidden">
        <img id="preview-img" class="w-full max-h-64 object-contain rounded-xl bg-slate-50 border border-slate-200">
      </div>

      <label for="file-input"
        class="flex items-center justify-center gap-2 border-2 border-dashed border-amber-300 rounded-xl py-6 text-amber-700 text-sm font-bold cursor-pointer hover:bg-amber-50 active:bg-amber-100 transition-all">
        <i class="fa-solid fa-camera text-lg"></i>
        <span id="file-input-label">タップして写真を撮る／選ぶ</span>
      </label>
      <input id="file-input" type="file" accept="image/*" class="hidden">
      <p class="text-[10px] text-slate-400">
        <i class="fa-solid fa-circle-info"></i> 送信前に自動で軽量化されます（通信量の節約）
      </p>
    </section>
  </div>

  <!-- フッター送信ボタン -->
  <footer id="submit-footer" class="hidden fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 shadow-[0_-4px_12px_rgba(0,0,0,0.05)] px-4 py-3 z-40">
    <div class="max-w-lg mx-auto">
      <button id="submit-btn" onclick="submitPhoto()" disabled
        class="w-full bg-amber-600 disabled:bg-slate-300 text-white font-bold py-3.5 px-4 rounded-xl shadow-md hover:bg-amber-700 active:scale-[0.98] transition-all flex items-center justify-center gap-2 text-sm">
        <i class="fa-solid fa-upload"></i> この写真を登録する
      </button>
    </div>
  </footer>

  <!-- モーダル -->
  <div id="custom-modal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 hidden">
    <div class="bg-white rounded-2xl max-w-sm w-full p-6 text-center space-y-4 shadow-xl">
      <div id="modal-icon" class="text-4xl text-amber-600"><i class="fa-solid fa-circle-info"></i></div>
      <h3 id="modal-title" class="font-bold text-lg text-slate-800">確認</h3>
      <p id="modal-message" class="text-sm text-slate-500 whitespace-pre-line text-left"></p>
      <button id="modal-ok-btn" onclick="closeModal()"
        class="w-full py-2.5 rounded-xl bg-amber-600 text-white text-sm font-bold hover:bg-amber-700 shadow-sm">OK</button>
    </div>
  </div>

  <div id="loading-spinner" class="fixed inset-0 bg-black/60 z-50 flex-col items-center justify-center text-white space-y-4 hidden">
    <div class="animate-spin rounded-full h-12 w-12 border-4 border-amber-500 border-t-transparent"></div>
    <p class="text-sm font-bold tracking-wider" id="loading-text">送信中...</p>
  </div>

  <script>
    // ★注意: 新規にLINE Developersコンソールで作成したLIFF IDに書き換えてください
    const LIFF_ID         = "2010665477-C3YW7CiM";
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw6NHW70u2A6pXhwfZujIJNQw37iu4YRYMsyldSfRaHs0jHsCd4h1e5w-KzI6TKPQWFVA/exec";
    const MAX_DIMENSION   = 1000; // リサイズ後の最大辺（px）
    const JPEG_QUALITY    = 0.82;

    let userProfile   = null;
    let allProducts   = [];
    let selectedCode  = null;
    let selectedName  = "";
    let resizedImage  = null; // { base64, mimeType }

    window.onload = function () {
      liff.init({ liffId: LIFF_ID })
        .then(() => {
          if (!liff.isLoggedIn()) { liff.login(); return; }
          return liff.getProfile();
        })
        .then(profile => {
          if (!profile) return;
          userProfile = profile;
          loadProductList();
        })
        .catch(err => {
          showStatus("error", "LIFFの初期化に失敗しました。LINEアプリ内でこのページを開いてください。");
          console.error(err);
        });
    };

    function showStatus(type, message) {
      const area = document.getElementById('status-area');
      area.classList.remove('hidden');
      document.getElementById('main-area').classList.add('hidden');
      document.getElementById('submit-footer').classList.add('hidden');
      if (type === "loading") {
        area.innerHTML = `<div class="animate-spin rounded-full h-8 w-8 border-2 border-amber-500 border-t-transparent mx-auto mb-3"></div>${message}`;
      } else if (type === "error") {
        area.innerHTML = `<i class="fa-solid fa-triangle-exclamation text-2xl text-red-400 mb-2 block"></i><p class="text-red-500 text-sm">${message}</p>`;
      }
    }

    async function loadProductList() {
      showStatus("loading", "商品情報を読み込んでいます...");
      try {
        const url = `${GAS_WEB_APP_URL}?action=getProductCodeList&userId=${encodeURIComponent(userProfile.userId)}`;
        const data = await (await fetch(url, { method: 'GET', redirect: 'follow' })).json();
        if (data.status !== "success") throw new Error(data.message || "読み込みに失敗しました。");

        allProducts = data.products || [];
        document.getElementById('status-area').classList.add('hidden');
        document.getElementById('main-area').classList.remove('hidden');
        document.getElementById('submit-footer').classList.remove('hidden');
        renderProductList(allProducts);
      } catch (err) {
        showStatus("error", err.message);
      }
    }

    function renderProductList(list) {
      const container = document.getElementById('product-list');
      if (list.length === 0) {
        container.innerHTML = '<div class="text-center text-xs text-slate-400 py-4">該当する商品がありません。</div>';
        return;
      }
      container.innerHTML = list.map(p => `
        <div class="product-row flex items-center gap-3 border border-slate-200 rounded-xl px-3 py-2 cursor-pointer hover:bg-amber-50 transition-all ${selectedCode === p.code ? 'selected' : ''}"
             onclick="selectProduct('${_escapeAttr(p.code)}','${_escapeAttr(p.name)}')">
          <div class="w-10 h-10 rounded-lg bg-amber-100 overflow-hidden shrink-0 flex items-center justify-center">
            ${p.imageUrl
              ? `<img src="${_escapeAttr(p.imageUrl)}" class="w-full h-full object-cover" loading="lazy">`
              : `<i class="fa-solid fa-bread-slice text-amber-400"></i>`}
          </div>
          <div class="flex-1 min-w-0">
            <p class="text-xs font-bold text-slate-800 truncate">${_escapeHtml(p.name || "(名称未設定)")}</p>
            <p class="text-[10px] text-slate-400">${_escapeHtml(p.code)}${p.imageUrl ? ' ・ 登録済み' : ''}</p>
          </div>
          ${selectedCode === p.code ? '<i class="fa-solid fa-circle-check text-amber-600"></i>' : ''}
        </div>`).join('');
    }

    document.getElementById('search-input').addEventListener('input', (e) => {
      const q = e.target.value.trim().toLowerCase();
      const filtered = !q ? allProducts : allProducts.filter(p =>
        (p.name || "").toLowerCase().includes(q) || (p.code || "").toLowerCase().includes(q));
      renderProductList(filtered);
    });

    function selectProduct(code, name) {
      selectedCode = code;
      selectedName = name;
      const label = document.getElementById('selected-product-label');
      label.classList.remove('hidden');
      label.querySelector('span').innerText = `選択中: ${name}（${code}）`;
      renderProductList(
        document.getElementById('search-input').value.trim()
          ? allProducts.filter(p => (p.name || "").toLowerCase().includes(document.getElementById('search-input').value.trim().toLowerCase()) || (p.code || "").toLowerCase().includes(document.getElementById('search-input').value.trim().toLowerCase()))
          : allProducts
      );
      updateSubmitState();
    }

    document.getElementById('file-input').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      document.getElementById('file-input-label').innerText = "リサイズしています...";
      try {
        const result = await resizeImageFile(file, MAX_DIMENSION, JPEG_QUALITY);
        resizedImage = result;
        document.getElementById('preview-img').src = result.dataUrl;
        document.getElementById('preview-area').classList.remove('hidden');
        document.getElementById('file-input-label').innerText = "別の写真に変更する";
        updateSubmitState();
      } catch (err) {
        console.error(err);
        showModal("エラー", "画像の読み込みに失敗しました。別の写真でお試しください。", "error");
        document.getElementById('file-input-label').innerText = "タップして写真を撮る／選ぶ";
      }
    });

    function resizeImageFile(file, maxDim, quality) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            let { width, height } = img;
            if (width > maxDim || height > maxDim) {
              if (width >= height) {
                height = Math.round(height * (maxDim / width));
                width = maxDim;
              } else {
                width = Math.round(width * (maxDim / height));
                height = maxDim;
              }
            }
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            const dataUrl = canvas.toDataURL('image/jpeg', quality);
            resolve({ dataUrl, mimeType: 'image/jpeg' });
          };
          img.onerror = () => reject(new Error("画像の読み込みに失敗しました。"));
          img.src = e.target.result;
        };
        reader.onerror = () => reject(new Error("ファイルの読み込みに失敗しました。"));
        reader.readAsDataURL(file);
      });
    }

    function updateSubmitState() {
      document.getElementById('submit-btn').disabled = !(selectedCode && resizedImage);
    }

    async function submitPhoto() {
      if (!selectedCode || !resizedImage) return;

      document.getElementById('loading-text').innerText = "アップロードしています...";
      document.getElementById('loading-spinner').classList.remove('hidden');
      document.getElementById('loading-spinner').classList.add('flex');

      try {
        const base64Data = resizedImage.dataUrl.split(',')[1];
        const payload = {
          userId: userProfile.userId,
          productCode: selectedCode,
          imageBase64: base64Data,
          mimeType: resizedImage.mimeType
        };

        const res = await fetch(`${GAS_WEB_APP_URL}?action=uploadProductPhoto`, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // ★GASのCORS制約回避のため text/plain を使用
          body: JSON.stringify(payload)
        });
        const data = await res.json();

        document.getElementById('loading-spinner').classList.add('hidden');
        document.getElementById('loading-spinner').classList.remove('flex');

        if (data.status !== "success") throw new Error(data.message || "登録に失敗しました。");

        showModal("登録完了 ✅", `「${data.productName || selectedName}」の写真を登録しました。\n発注画面にも反映されます。`, "success");

        // フォームをリセットして、一覧を再取得（登録済みバッジ更新のため）
        resizedImage = null;
        selectedCode = null;
        selectedName = "";
        document.getElementById('preview-area').classList.add('hidden');
        document.getElementById('selected-product-label').classList.add('hidden');
        document.getElementById('file-input-label').innerText = "タップして写真を撮る／選ぶ";
        document.getElementById('file-input').value = "";
        updateSubmitState();
        loadProductList();

      } catch (err) {
        document.getElementById('loading-spinner').classList.add('hidden');
        document.getElementById('loading-spinner').classList.remove('flex');
        showModal("エラー", err.message, "error");
      }
    }

    function showModal(title, message, type) {
      const iconMap = {
        success: { cls: "text-4xl text-green-500", html: '<i class="fa-solid fa-circle-check"></i>' },
        error:   { cls: "text-4xl text-red-500",   html: '<i class="fa-solid fa-triangle-exclamation"></i>' },
        info:    { cls: "text-4xl text-amber-600", html: '<i class="fa-solid fa-circle-info"></i>' }
      };
      const icon = iconMap[type] || iconMap.info;
      document.getElementById('modal-icon').className = icon.cls;
      document.getElementById('modal-icon').innerHTML = icon.html;
      document.getElementById('modal-title').innerText = title;
      document.getElementById('modal-message').innerText = message;
      document.getElementById('custom-modal').classList.remove('hidden');
    }
    function closeModal() {
      document.getElementById('custom-modal').classList.add('hidden');
    }

    function _escapeHtml(str) {
      return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
    }
    function _escapeAttr(str) {
      return _escapeHtml(str).replace(/`/g, "&#96;");
    }
  </script>
</body>
</html>
