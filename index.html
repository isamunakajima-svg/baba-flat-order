<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>パン工房 卸専用発注システム</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body {
      -webkit-tap-highlight-color: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans JP", sans-serif;
    }
  </style>
</head>
<body class="bg-amber-50/40 text-slate-800 min-h-screen flex flex-col pb-24">

  <header class="bg-amber-700 text-white shadow-md sticky top-0 z-50">
    <div class="px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <i class="fa-solid fa-bread-slice text-2xl text-amber-300"></i>
        <h1 class="font-bold text-lg tracking-wide">パン工房 卸発注</h1>
      </div>
      <div id="user-profile" class="flex items-center gap-2">
        <img id="user-avatar" class="w-8 h-8 rounded-full border border-amber-500" src="https://placehold.co/100x100/d97706/ffffff?text=Bakery" alt="Avatar">
        <span id="user-name" class="text-xs font-bold max-w-[120px] truncate">読込中...</span>
      </div>
    </div>
  </header>

  <main class="flex-1 max-w-lg w-full mx-auto px-4 py-6 space-y-6">
    
    <section class="bg-white p-4 rounded-2xl shadow-sm border border-amber-100 space-y-4">
      <h2 class="font-bold text-amber-900 flex items-center gap-2 text-base border-b border-amber-100 pb-2">
        <i class="fa-solid fa-truck-fast"></i> 納品日の指定
      </h2>
      
      <div class="space-y-1">
        <label for="delivery-date" class="block text-xs font-bold text-slate-500">納品希望日 <span class="text-red-500">※必須</span></label>
        <input type="date" id="delivery-date" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500 font-semibold" required>
        <p class="text-[10px] text-amber-700"><i class="fa-solid fa-circle-info"></i> 当日・翌日の配送は締め切っております。明後日以降を選択してください。</p>
      </div>

      <div class="space-y-1">
        <label for="notes" class="block text-xs font-bold text-slate-500">備考・連絡事項</label>
        <textarea id="notes" rows="2" placeholder="（例）10時までに納品希望、資材追加など" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500 placeholder:text-slate-400"></textarea>
      </div>
    </section>

    <section class="space-y-3">
      <div class="flex items-center justify-between">
        <h2 class="font-bold text-amber-900 flex items-center gap-2 text-base">
          <i class="fa-solid fa-list"></i> あなたの店舗の専用価格
        </h2>
        <span class="text-xs bg-green-100 text-green-800 px-2 py-0.5 rounded-full font-bold">適用済単価 (税込)</span>
      </div>

      <div id="product-list" class="space-y-3">
        <div class="text-center py-8 text-slate-400 text-sm">
          <div class="animate-spin rounded-full h-8 w-8 border-2 border-amber-500 border-t-transparent mx-auto mb-2"></div>
          商品情報を読み込んでいます...
        </div>
      </div>
    </section>

  </main>

  <footer class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 shadow-[0_-4px_12px_rgba(0,0,0,0.05)] px-4 py-3 z-40">
    <div class="max-w-lg mx-auto flex items-center justify-between gap-4">
      <div>
        <p class="text-[10px] text-slate-400 font-bold">合計点数: <span id="total-count">0</span> 点</p>
        <p class="text-amber-800 font-black text-xl">¥<span id="total-price">0</span> <span class="text-xs text-slate-400 font-normal">(税込)</span></p>
      </div>
      <button onclick="submitOrder()" id="submit-btn" class="flex-1 bg-amber-600 text-white font-bold py-3.5 px-4 rounded-xl shadow-md hover:bg-amber-700 active:scale-[0.98] transition-all flex items-center justify-center gap-2 text-sm">
        <i class="fa-solid fa-paper-plane"></i> この内容で発注する
      </button>
    </div>
  </footer>

  <div id="custom-modal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 hidden">
    <div class="bg-white rounded-2xl max-w-sm w-full p-6 text-center space-y-4 shadow-xl">
      <div id="modal-icon" class="text-4xl text-amber-600">
        <i class="fa-solid fa-circle-info"></i>
      </div>
      <h3 id="modal-title" class="font-bold text-lg text-slate-800">確認</h3>
      <p id="modal-message" class="text-sm text-slate-500 whitespace-pre-line text-left"></p>
      <div class="flex gap-3 pt-2">
        <button id="modal-cancel-btn" onclick="closeModal()" class="flex-1 py-2.5 rounded-xl border border-slate-200 text-sm font-semibold text-slate-600 bg-slate-50 hover:bg-slate-100 hidden">閉じる</button>
        <button id="modal-ok-btn" onclick="closeModal()" class="flex-1 py-2.5 rounded-xl bg-amber-600 text-white text-sm font-bold hover:bg-amber-700 shadow-sm">OK</button>
      </div>
    </div>
  </div>

  <div id="loading-spinner" class="fixed inset-0 bg-black/60 z-50 flex flex-col items-center justify-center text-white space-y-4 hidden">
    <div class="animate-spin rounded-full h-12 w-12 border-4 border-amber-500 border-t-transparent"></div>
    <p class="text-sm font-bold tracking-wider">データを送信中...</p>
  </div>

  <script>
    const LIFF_ID = "2010380481-8ICWLCgL"; 
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzik00tJnW0jCTpXK1Q_3T5N2L4DOFhi1j6hVge5VZ1e3-D68k9PnU4YHh5ehh_scTC6Q/exec"; 
    
    let userProfile = { userId: "test_local_user", displayName: "中島イサム" };
    let products = [];
    let cart = {};

    window.onload = function() {
      setupDeliveryDate();

      if (LIFF_ID) {
        initLiff();
      } else {
        loadProducts();
      }
    };

    function setupDeliveryDate() {
      const deliveryInput = document.getElementById('delivery-date');
      const today = new Date();
      const minDate = new Date(today);
      minDate.setDate(today.getDate() + 2); 
      
      const yyyy = minDate.getFullYear();
      const mm = String(minDate.getMonth() + 1).padStart(2, '0');
      const dd = String(minDate.getDate()).padStart(2, '0');
      
      deliveryInput.min = `${yyyy}-${mm}-${dd}`;
      deliveryInput.value = `${yyyy}-${mm}-${dd}`;
    }

    function initLiff() {
      liff.init({ liffId: LIFF_ID })
        .then(() => {
          if (!liff.isLoggedIn()) {
            liff.login();
          } else {
            liff.getProfile()
              .then(profile => {
                userProfile = profile;
                document.getElementById('user-name').innerText = profile.displayName;
                if (profile.pictureUrl) {
                  document.getElementById('user-avatar').src = profile.pictureUrl;
                }
                loadProducts();
              })
              .catch(err => {
                console.error("プロフィール取得エラー:", err);
                loadProducts();
              });
          }
        })
        .catch(err => {
          console.error("LIFFエラー:", err);
          loadProducts(); 
        });
    }

    // --- GASから店舗専用価格の商品一覧を読み込む ---
    async function loadProducts() {
      try {
        const params = new URLSearchParams();
        params.append('jsonData', JSON.stringify({
          action: "getProducts",
          shopName: userProfile.displayName 
        }));

        const response = await fetch(GAS_WEB_APP_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/x-www-form-urlencoded'
          },
          body: params
        });
        const data = await response.json();
        
        if (data.status === "success") {
          products = data.products.map((p, index) => {
            let emoji = "🍞";
            let desc = "卸専用商品";
            if (p.name.includes("クロワッサン")) { emoji = "🥐"; desc = "香り高い発酵バター使用"; }
            else if (p.name.includes("塩パン")) { emoji = "🥯"; desc = "外はカリッと中はジュワッと"; }
            else if (p.name.includes("メロンパン")) { emoji = "🍪"; desc = "サクサク食感が自慢"; }
            
            return {
              id: p.code || "p" + index, 
              name: p.name,
              price: Number(p.price),
              emoji: emoji,
              desc: desc
            };
          });
          
          renderProducts();
        } else {
          throw new Error(data.message);
        }
      } catch (error) {
        console.error("商品データの読み込み失敗、バックアップを作動します:", error);
        products = [
          { id: "p1", name: "特製高級食パン (2斤)", price: 540, emoji: "🍞", desc: "きめ細かく、もっちり食感" },
          { id: "p2", name: "発酵バタークロワッサン", price: 180, emoji: "🥐", desc: "香り高い発酵バターを100%使用" },
          { id: "p3", name: "極上塩パン", price: 140, emoji: "🥯", desc: "外はカリッと、中はジュワッとバター" },
          { id: "p4", name: "サクサクメロンパン", price: 160, emoji: "🍪", desc: "クッキー生地のサクサク感が自慢" }
        ];
        renderProducts();
      }
    }

    // --- 商品リストを画面に表示 ---
    function renderProducts() {
      const listContainer = document.getElementById('product-list');
      listContainer.innerHTML = '';

      if (products.length === 0) {
        listContainer.innerHTML = '<div class="text-center py-8 text-slate-400 text-sm">商品マスタに登録がありません。</div>';
        return;
      }

      products.forEach(p => {
        const qty = cart[p.id] || 0;
        const cardHtml = `
          <div class="product-card bg-white p-3.5 rounded-2xl shadow-sm border border-slate-100 flex gap-4 items-center" data-id="${p.id}" data-name="${p.name}" data-price="${p.price}">
            <div class="w-16 h-16 rounded-xl bg-amber-100 flex items-center justify-center overflow-hidden shrink-0">
              <span class="text-3xl">${p.emoji}</span>
            </div>
            <div class="flex-1 min-w-0">
              <h3 class="font-bold text-slate-800 text-sm truncate">${p.name}</h3>
              <p class="text-xs text-slate-400 mt-0.5">${p.desc}</p>
              <div class="text-amber-700 font-bold text-sm mt-2">¥${p.price.toLocaleString()} <span class="text-[10px] text-slate-400 font-normal">/ 個</span></div>
            </div>
            <div class="flex items-center gap-2 shrink-0">
              <button onclick="changeQty('${p.id}', -1)" class="w-8 h-8 rounded-full bg-slate-100 text-slate-600 font-bold flex items-center justify-center hover:bg-slate-200 active:scale-95 transition-all"><i class="fa-solid fa-minus text-xs"></i></button>
              <span id="qty-${p.id}" class="w-6 text-center font-bold text-sm">${qty}</span>
              <button onclick="changeQty('${p.id}', 1)" class="w-8 h-8 rounded-full bg-amber-100 text-amber-800 font-bold flex items-center justify-center hover:bg-amber-200 active:scale-95 transition-all"><i class="fa-solid fa-plus text-xs"></i></button>
            </div>
          </div>
        `;
        listContainer.insertAdjacentHTML('beforeend', cardHtml);
      });
    }

    function changeQty(productId, amount) {
      if (!cart[productId]) cart[productId] = 0;
      cart[productId] = Math.max(0, cart[productId] + amount);
      document.getElementById(`qty-${productId}`).innerText = cart[productId];
      calculateTotal();
    }

    function calculateTotal() {
      let totalCount = 0;
      let totalPrice = 0;

      products.forEach(p => {
        const qty = cart[p.id] || 0;
        totalCount += qty;
        totalPrice += qty * p.price;
      });

      document.getElementById('total-count').innerText = totalCount;
      document.getElementById('total-price').innerText = totalPrice.toLocaleString();
    }

    function showModal(title, message, type = "info", showCancel = false) {
      const modal = document.getElementById('custom-modal');
      const icon = document.getElementById('modal-icon');
      const titleEl = document.getElementById('modal-title');
      const msgEl = document.getElementById('modal-message');
      const cancelBtn = document.getElementById('modal-cancel-btn');

      titleEl.innerText = title;
      msgEl.innerText = message;

      if (type === "success") {
        icon.className = "text-4xl text-green-500";
        icon.innerHTML = '<i class="fa-solid fa-circle-check"></i>';
      } else if (type === "error") {
        icon.className = "text-4xl text-red-500";
        icon.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i>';
      } else if (type === "confirm") {
        icon.className = "text-4xl text-amber-500";
        icon.innerHTML = '<i class="fa-solid fa-circle-question"></i>';
      } else {
        icon.className = "text-4xl text-amber-600";
        icon.innerHTML = '<i class="fa-solid fa-circle-info"></i>';
      }

      cancelBtn.classList.toggle('hidden', !showCancel);
      modal.classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('custom-modal').classList.add('hidden');
    }

    function submitOrder() {
      const deliveryDate = document.getElementById('delivery-date').value;
      const notes = document.getElementById('notes').value;

      if (!deliveryDate) {
        showModal("入力エラー", "納品希望日を選択してください。", "error");
        return;
      }

      const orderItems = [];
      let grandTotal = 0;

      products.forEach(p => {
        const qty = cart[p.id] || 0;
        if (qty > 0) {
          const subtotal = p.price * qty;
          orderItems.push({
            productId: p.id,
            productName: p.name,
            price: p.price,
            quantity: qty,
            subtotal: subtotal
          });
          grandTotal += subtotal;
        }
      });

      if (orderItems.length === 0) {
        showModal("入力エラー", "商品が選択されていません。", "error");
        return;
      }

      let confirmMessage = `店舗名: ${userProfile.displayName}\n納品希望日: ${deliveryDate}\n\n【ご注文内容】\n`;
      orderItems.forEach(item => {
        confirmMessage += `・${item.productName} × ${item.quantity} (単価: ¥${item.price})\n`;
      });
      confirmMessage += `\n合計金額: ¥${grandTotal.toLocaleString()}\n\nこの内容で発注してよろしいですか？`;

      showModal("発注確認", confirmMessage, "confirm", true);

      const okBtn = document.getElementById('modal-ok-btn');
      okBtn.onclick = function() {
        closeModal();
        sendDataToGas(deliveryDate, notes, orderItems, grandTotal);
      };
    }

    async function sendDataToGas(deliveryDate, notes, items, grandTotal) {
      const spinner = document.getElementById('loading-spinner');
      spinner.classList.remove('hidden');

      const params = new URLSearchParams();
      params.append('jsonData', JSON.stringify({
        userId: userProfile.userId,
        userName: userProfile.displayName,
        deliveryDate: deliveryDate,
        notes: notes,
        items: items,
        totalPrice: grandTotal
      }));

      const maxRetries = 5;
      let delay = 1000;

      for (let attempt = 1; attempt <= maxRetries; attempt++) {
        try {
          await fetch(GAS_WEB_APP_URL, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/x-www-form-urlencoded'
            },
            body: params
          });

          spinner.classList.add('hidden');
          showModal(
            "発注完了", 
            "ご注文データを送信しました！\n\nスプレッドシートを開き、「注文履歴」シートに新しい行が追加されているか確認してください。", 
            "success"
          );
          
          document.getElementById('modal-ok-btn').onclick = function() {
            location.reload();
          };
          return;

        } catch (error) {
          console.warn("送信試行中の警告:", error);
          if (attempt === maxRetries) {
            spinner.classList.add('hidden');
            showModal("通信エラー", "接続に失敗しました。電波の良い場所で再度お試しください。", "error");
            return;
          }
          await new Promise(resolve => setTimeout(resolve, delay));
          delay *= 2;
        }
      }
    }
  </script>
</body>
</html>
