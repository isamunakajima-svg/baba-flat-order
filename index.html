<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>馬場FLAT 卸専用発注システム</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body {
      -webkit-tap-highlight-color: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans JP", sans-serif;
    }
  </style>
</head>
<body class="bg-amber-50/40 text-slate-800 min-h-screen flex flex-col pb-24">

  <header class="bg-amber-700 text-white shadow-md sticky top-0 z-50">
    <div class="px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <i class="fa-solid fa-bread-slice text-2xl text-amber-300"></i>
        <h1 class="font-bold text-lg tracking-wide">馬場FLAT 卸発注</h1>
      </div>
      <div id="user-profile" class="flex items-center gap-2">
        <img id="user-avatar" class="w-8 h-8 rounded-full border border-amber-500" src="https://placehold.co/100x100/d97706/ffffff?text=Bakery" alt="Avatar">
        <span id="user-name" class="text-xs font-bold max-w-[120px] truncate">読込中...</span>
      </div>
    </div>
  </header>

  <main class="flex-1 max-w-lg w-full mx-auto px-4 py-6 space-y-6">

    <section class="bg-white p-4 rounded-2xl shadow-sm border border-amber-100 space-y-4">
      <h2 class="font-bold text-amber-900 flex items-center gap-2 text-base border-b border-amber-100 pb-2">
        <i class="fa-solid fa-truck-fast"></i> 納品日の指定
      </h2>

      <div class="space-y-1">
        <label for="delivery-date" class="block text-xs font-bold text-slate-500">
          納品希望日 <span class="text-red-500">※必須</span>
        </label>
        <input type="date" id="delivery-date"
          class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500 font-semibold"
          required>
        <p class="text-[10px] text-amber-700">
          <i class="fa-solid fa-circle-info"></i> 当日・翌日の配送は締め切っております。明後日以降を選択してください。
        </p>
      </div>

      <div class="space-y-1">
        <label for="notes" class="block text-xs font-bold text-slate-500">備考・連絡事項</label>
        <textarea id="notes" rows="2"
          placeholder="（例）10時までに納品希望、資材追加など"
          class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500 placeholder:text-slate-400"></textarea>
      </div>
    </section>

    <section class="space-y-3">
      <div class="flex items-center justify-between">
        <h2 class="font-bold text-amber-900 flex items-center gap-2 text-base">
          <i class="fa-solid fa-list"></i> あなたの店舗の商品リスト
        </h2>
        <span class="text-xs bg-green-100 text-green-800 px-2 py-0.5 rounded-full font-bold">単価 (税込)</span>
      </div>

      <div id="product-list" class="space-y-3">
        <div class="text-center py-8 text-slate-400 text-sm">
          <div class="animate-spin rounded-full h-8 w-8 border-2 border-amber-500 border-t-transparent mx-auto mb-2"></div>
          商品情報を読み込んでいます...
        </div>
      </div>
    </section>

  </main>

  <footer class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 shadow-[0_-4px_12px_rgba(0,0,0,0.05)] px-4 py-3 z-40">
    <div class="max-w-lg mx-auto flex items-center justify-between gap-4">
      <div>
        <p class="text-[10px] text-slate-400 font-bold">合計点数: <span id="total-count">0</span> 点</p>
        <p class="text-amber-800 font-black text-xl">¥<span id="total-price">0</span> <span class="text-xs text-slate-400 font-normal">(税込)</span></p>
      </div>
      <button onclick="submitOrder()" id="submit-btn"
        class="flex-1 bg-amber-600 text-white font-bold py-3.5 px-4 rounded-xl shadow-md hover:bg-amber-700 active:scale-[0.98] transition-all flex items-center justify-center gap-2 text-sm">
        <i class="fa-solid fa-paper-plane"></i> この内容で発注する
      </button>
    </div>
  </footer>

  <!-- モーダル -->
  <div id="custom-modal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 hidden">
    <div class="bg-white rounded-2xl max-w-sm w-full p-6 text-center space-y-4 shadow-xl">
      <div id="modal-icon" class="text-4xl text-amber-600">
        <i class="fa-solid fa-circle-info"></i>
      </div>
      <h3 id="modal-title" class="font-bold text-lg text-slate-800">確認</h3>
      <p id="modal-message" class="text-sm text-slate-500 whitespace-pre-line text-left"></p>
      <div class="flex gap-3 pt-2">
        <button id="modal-cancel-btn" onclick="closeModal()"
          class="flex-1 py-2.5 rounded-xl border border-slate-200 text-sm font-semibold text-slate-600 bg-slate-50 hover:bg-slate-100 hidden">
          閉じる
        </button>
        <button id="modal-ok-btn" onclick="closeModal()"
          class="flex-1 py-2.5 rounded-xl bg-amber-600 text-white text-sm font-bold hover:bg-amber-700 shadow-sm">
          OK
        </button>
      </div>
    </div>
  </div>

  <!-- 送信中スピナー -->
  <div id="loading-spinner" class="fixed inset-0 bg-black/60 z-50 flex flex-col items-center justify-center text-white space-y-4 hidden">
    <div class="animate-spin rounded-full h-12 w-12 border-4 border-amber-500 border-t-transparent"></div>
    <p class="text-sm font-bold tracking-wider">データを送信中...</p>
  </div>

  <script>
    // ============================================================
    //  設定 (ここを変更してください)
    // ============================================================
    const LIFF_ID       = "2010395299-6xRjcACT";
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzik00tJnW0jCTpXK1Q_3T5N2L4DOFhi1j6hVge5VZ1e3-D68k9PnU4YHh5ehh_scTC6Q/exec";

    // ============================================================
    //  状態管理
    // ============================================================
    let userProfile = { userId: "test_local_user", displayName: "テストユーザー" };
    let products = [];
    let cart = {};

    // ============================================================
    //  初期化
    // ============================================================
    window.onload = function () {
      setupDeliveryDate();
      if (LIFF_ID) {
        initLiff();
      } else {
        loadProducts();
      }
    };

    function setupDeliveryDate() {
      const deliveryInput = document.getElementById('delivery-date');
      const minDate = new Date();
      minDate.setDate(minDate.getDate() + 2);

      const yyyy = minDate.getFullYear();
      const mm   = String(minDate.getMonth() + 1).padStart(2, '0');
      const dd   = String(minDate.getDate()).padStart(2, '0');

      deliveryInput.min   = `${yyyy}-${mm}-${dd}`;
      deliveryInput.value = `${yyyy}-${mm}-${dd}`;
    }

    function initLiff() {
      liff.init({ liffId: LIFF_ID })
        .then(() => {
          if (!liff.isLoggedIn()) {
            liff.login();
          } else {
            liff.getProfile()
              .then(profile => {
                userProfile = {
                  userId:      profile.userId,
                  displayName: profile.displayName,
                  pictureUrl:  profile.pictureUrl || null
                };
                document.getElementById('user-name').innerText = profile.displayName;
                if (profile.pictureUrl) {
                  document.getElementById('user-avatar').src = profile.pictureUrl;
                }
                loadProducts();
              })
              .catch(err => {
                console.error("プロフィール取得エラー:", err);
                loadProducts();
              });
          }
        })
        .catch(err => {
          console.error("LIFFエラー:", err);
          loadProducts();
        });
    }

    // ============================================================
    //  【修正①】商品リストの取得
    //  - userId と shopName の両方を送る
    //  - action: "getProducts" を明示
    //  - フォールバック商品を削除（架空データを表示しない）
    // ============================================================
    async function loadProducts() {
      try {
        const params = new URLSearchParams();
        params.append('jsonData', JSON.stringify({
          action:   "getProducts",
          userId:   userProfile.userId,       // ← 追加
          shopName: userProfile.displayName   // ← キー名を shopName に統一
        }));

        const response = await fetch(GAS_WEB_APP_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: params
        });

        const data = await response.json();

        if (data.status !== "success") {
          throw new Error(data.message || "商品データの取得に失敗しました。");
        }

        products = data.products.map((p, index) => {
          let emoji = "🍞";
          let desc  = "卸専用商品";
          if (p.name.includes("クロワッサン"))    { emoji = "🥐"; desc = "香り高い発酵バター使用"; }
          else if (p.name.includes("塩パン"))     { emoji = "🥯"; desc = "外はカリッと中はジュワッと"; }
          else if (p.name.includes("メロンパン")) { emoji = "🍪"; desc = "サクサク食感が自慢"; }

          return {
            id:    p.code || "p" + index,
            name:  p.name,
            price: Number(p.price),
            emoji: emoji,
            desc:  desc
          };
        });

        renderProducts();

      } catch (error) {
        console.error("商品データの読み込みに失敗:", error);
        // フォールバック: 架空データではなくエラーメッセージを表示
        document.getElementById('product-list').innerHTML = `
          <div class="text-center py-8 text-red-400 text-sm space-y-2">
            <i class="fa-solid fa-triangle-exclamation text-2xl"></i>
            <p>商品情報を読み込めませんでした。</p>
            <p class="text-xs text-slate-400">${error.message}</p>
            <button onclick="loadProducts()"
              class="mt-2 px-4 py-2 bg-amber-600 text-white rounded-xl text-xs font-bold hover:bg-amber-700">
              再読み込み
            </button>
          </div>`;
      }
    }

    // ============================================================
    //  商品カードの描画
    // ============================================================
    function renderProducts() {
      const listContainer = document.getElementById('product-list');
      listContainer.innerHTML = '';

      if (products.length === 0) {
        listContainer.innerHTML = '<div class="text-center py-8 text-slate-400 text-sm">商品マスタに登録がありません。</div>';
        return;
      }

      products.forEach(p => {
        const qty = cart[p.id] || 0;
        listContainer.insertAdjacentHTML('beforeend', `
          <div class="product-card bg-white p-3.5 rounded-2xl shadow-sm border border-slate-100 flex gap-4 items-center"
               data-id="${p.id}" data-name="${p.name}" data-price="${p.price}">
            <div class="w-16 h-16 rounded-xl bg-amber-100 flex items-center justify-center overflow-hidden shrink-0">
              <span class="text-3xl">${p.emoji}</span>
            </div>
            <div class="flex-1 min-w-0">
              <h3 class="font-bold text-slate-800 text-sm truncate">${p.name}</h3>
              <p class="text-xs text-slate-400 mt-0.5">${p.desc}</p>
              <div class="text-amber-700 font-bold text-sm mt-2">
                ¥${p.price.toLocaleString()} <span class="text-[10px] text-slate-400 font-normal">/ 個</span>
              </div>
            </div>
            <div class="flex items-center gap-2 shrink-0">
              <button onclick="changeQty('${p.id}', -1)"
                class="w-8 h-8 rounded-full bg-slate-100 text-slate-600 font-bold flex items-center justify-center hover:bg-slate-200 active:scale-95 transition-all">
                <i class="fa-solid fa-minus text-xs"></i>
              </button>
              <span id="qty-${p.id}" class="w-6 text-center font-bold text-sm">${qty}</span>
              <button onclick="changeQty('${p.id}', 1)"
                class="w-8 h-8 rounded-full bg-amber-100 text-amber-800 font-bold flex items-center justify-center hover:bg-amber-200 active:scale-95 transition-all">
                <i class="fa-solid fa-plus text-xs"></i>
              </button>
            </div>
          </div>
        `);
      });
    }

    // ============================================================
    //  カート操作
    // ============================================================
    function changeQty(productId, amount) {
      if (!cart[productId]) cart[productId] = 0;
      cart[productId] = Math.max(0, cart[productId] + amount);
      document.getElementById(`qty-${productId}`).innerText = cart[productId];
      calculateTotal();
    }

    function calculateTotal() {
      let totalCount = 0;
      let totalPrice = 0;
      products.forEach(p => {
        const qty = cart[p.id] || 0;
        totalCount += qty;
        totalPrice += qty * p.price;
      });
      document.getElementById('total-count').innerText = totalCount;
      document.getElementById('total-price').innerText = totalPrice.toLocaleString();
    }

    // ============================================================
    //  モーダル
    // ============================================================
    function showModal(title, message, type = "info", showCancel = false) {
      const iconMap = {
        success: { cls: "text-4xl text-green-500",  html: '<i class="fa-solid fa-circle-check"></i>' },
        error:   { cls: "text-4xl text-red-500",    html: '<i class="fa-solid fa-triangle-exclamation"></i>' },
        confirm: { cls: "text-4xl text-amber-500",  html: '<i class="fa-solid fa-circle-question"></i>' },
        info:    { cls: "text-4xl text-amber-600",  html: '<i class="fa-solid fa-circle-info"></i>' }
      };
      const icon = iconMap[type] || iconMap.info;

      document.getElementById('modal-icon').className   = icon.cls;
      document.getElementById('modal-icon').innerHTML   = icon.html;
      document.getElementById('modal-title').innerText  = title;
      document.getElementById('modal-message').innerText = message;
      document.getElementById('modal-cancel-btn').classList.toggle('hidden', !showCancel);

      // OK ボタンのイベントをリセット（二重登録防止）
      _resetOkBtn(() => closeModal());

      document.getElementById('custom-modal').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('custom-modal').classList.add('hidden');
    }

    /** OK ボタンの onclick を安全に差し替える */
    function _resetOkBtn(handler) {
      const old = document.getElementById('modal-ok-btn');
      const newBtn = old.cloneNode(true);
      old.parentNode.replaceChild(newBtn, old);
      newBtn.addEventListener('click', handler);
    }

    // ============================================================
    //  【修正②】発注処理
    //  - items が空の場合はモーダルでエラー表示（GAS 送信前に弾く）
    //  - 確認後に二重送信しない (_resetOkBtn を使用)
    // ============================================================
    function submitOrder() {
      const deliveryDate = document.getElementById('delivery-date').value;
      const notes        = document.getElementById('notes').value;

      if (!deliveryDate) {
        showModal("入力エラー", "納品希望日を選択してください。", "error");
        return;
      }

      const orderItems = [];
      let grandTotal = 0;

      products.forEach(p => {
        const qty = cart[p.id] || 0;
        if (qty > 0) {
          const subtotal = p.price * qty;
          orderItems.push({
            productId:   p.id,
            productName: p.name,
            price:       p.price,
            quantity:    qty,
            subtotal:    subtotal
          });
          grandTotal += subtotal;
        }
      });

      if (orderItems.length === 0) {
        showModal("入力エラー", "商品が選択されていません。", "error");
        return;
      }

      let confirmMessage = `店舗名: ${userProfile.displayName}\n納品希望日: ${deliveryDate}\n\n【ご注文内容】\n`;
      orderItems.forEach(item => {
        confirmMessage += `・${item.productName} × ${item.quantity}個 (¥${item.price.toLocaleString()} / 個)\n`;
      });
      confirmMessage += `\n合計金額: ¥${grandTotal.toLocaleString()}\n\nこの内容で発注してよろしいですか？`;

      // 確認モーダルを表示し、OK で送信
      document.getElementById('modal-icon').className  = "text-4xl text-amber-500";
      document.getElementById('modal-icon').innerHTML  = '<i class="fa-solid fa-circle-question"></i>';
      document.getElementById('modal-title').innerText = "発注確認";
      document.getElementById('modal-message').innerText = confirmMessage;
      document.getElementById('modal-cancel-btn').classList.remove('hidden');
      _resetOkBtn(() => {
        closeModal();
        sendDataToGas(deliveryDate, notes, orderItems, grandTotal);
      });
      document.getElementById('custom-modal').classList.remove('hidden');
    }

    // ============================================================
    //  【修正③】GAS へのデータ送信
    //  - shopName キーに統一 (userName → shopName)
    //  - action: "submitOrder" を明示
    //  - レスポンスの status を必ず検証
    // ============================================================
    async function sendDataToGas(deliveryDate, notes, items, grandTotal) {
      const spinner = document.getElementById('loading-spinner');
      spinner.classList.remove('hidden');

      const params = new URLSearchParams();
      params.append('jsonData', JSON.stringify({
        action:       "submitOrder",            // ← action を明示
        userId:       userProfile.userId,
        shopName:     userProfile.displayName,  // ← userName → shopName に統一
        deliveryDate: deliveryDate,
        notes:        notes,
        items:        items,
        totalPrice:   grandTotal
      }));

      const maxRetries = 3;
      let delay = 1500;

      for (let attempt = 1; attempt <= maxRetries; attempt++) {
        try {
          const response = await fetch(GAS_WEB_APP_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: params
          });

          // ← レスポンスの status を必ず検証
          const data = await response.json();
          if (data.status !== "success") {
            throw new Error(data.message || "サーバーエラーが発生しました。");
          }

          spinner.classList.add('hidden');
          showModal(
            "発注完了 ✅",
            `発注番号: ${data.orderId}\n\nご注文を受け付けました！\n注文履歴シートに記録されています。`,
            "success"
          );
          _resetOkBtn(() => {
            closeModal();
            location.reload();
          });
          return;

        } catch (error) {
          console.warn(`送信試行 ${attempt}/${maxRetries} 失敗:`, error);
          if (attempt === maxRetries) {
            spinner.classList.add('hidden');
            showModal(
              "送信エラー",
              `送信に失敗しました。\n\n${error.message}\n\n電波の良い場所で再度お試しください。`,
              "error"
            );
            return;
          }
          await new Promise(resolve => setTimeout(resolve, delay));
          delay *= 2;
        }
      }
    }
  </script>
</body>
</html>
