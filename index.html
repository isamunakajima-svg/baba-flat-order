<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>馬場FLAT 卸専用発注システム</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans JP", sans-serif; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .cal-day.has-order { background-color: #fef3c7; border: 2px solid #d97706; font-weight: bold; cursor: pointer; }
    .cal-day.has-order:hover { background-color: #fde68a; }
    .cal-day.today { border: 2px solid #f59e0b; }
    .cal-day.other-month { color: #cbd5e1; }
  </style>
</head>
<body class="bg-amber-50/40 text-slate-800 min-h-screen flex flex-col pb-24">

  <header class="bg-amber-700 text-white shadow-md sticky top-0 z-50">
    <div class="px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <i class="fa-solid fa-bread-slice text-2xl text-amber-300"></i>
        <h1 class="font-bold text-lg tracking-wide">馬場FLAT 卸発注</h1>
      </div>
      <div id="user-profile" class="flex items-center gap-2">
        <img id="user-avatar" class="w-8 h-8 rounded-full border border-amber-500"
          src="https://placehold.co/100x100/d97706/ffffff?text=Bakery" alt="Avatar">
        <div class="text-right">
          <p id="shop-name" class="text-xs font-black text-amber-200 max-w-[120px] truncate"></p>
          <p id="user-name" class="text-[10px] text-amber-300 max-w-[120px] truncate">読込中...</p>
        </div>
      </div>
    </div>
    <!-- タブ -->
    <div class="flex border-t border-amber-600">
      <button onclick="switchTab('order')" id="tab-order"
        class="flex-1 py-2 text-xs font-bold text-amber-200 border-b-2 border-amber-300">
        <i class="fa-solid fa-paper-plane mr-1"></i>発注
      </button>
      <button onclick="switchTab('history')" id="tab-history"
        class="flex-1 py-2 text-xs font-bold text-amber-400 border-b-2 border-transparent">
        <i class="fa-solid fa-calendar-days mr-1"></i>注文履歴
      </button>
    </div>
  </header>

  <!-- ===== 発注タブ ===== -->
  <div id="tab-content-order" class="tab-content active flex-1 max-w-lg w-full mx-auto px-4 py-6 space-y-6">
    <section class="bg-white p-4 rounded-2xl shadow-sm border border-amber-100 space-y-4">
      <h2 class="font-bold text-amber-900 flex items-center gap-2 text-base border-b border-amber-100 pb-2">
        <i class="fa-solid fa-truck-fast"></i> 納品日の指定
      </h2>
      <div class="space-y-1">
        <label for="delivery-date" class="block text-xs font-bold text-slate-500">
          納品希望日 <span class="text-red-500">※必須</span>
        </label>
        <input type="date" id="delivery-date"
          class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500 font-semibold"
          required onchange="updateDayOfWeek()">
        <p id="day-of-week" class="text-sm font-bold text-amber-700 mt-1 pl-1"></p>
        <p class="text-[10px] text-amber-700">
          <i class="fa-solid fa-circle-info"></i> 【18:00締め切り】当日・翌日・翌々日の配送は締め切っております。（18:00以降のご注文は4日後以降となります）
        </p>
      </div>
      <div class="space-y-1">
        <label for="notes" class="block text-xs font-bold text-slate-500">備考・連絡事項</label>
        <textarea id="notes" rows="2" placeholder="（例）番重返却依頼など"
          class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500 placeholder:text-slate-400"></textarea>
      </div>
    </section>

    <section class="space-y-3">
      <div class="flex items-center justify-between">
        <h2 class="font-bold text-amber-900 flex items-center gap-2 text-base">
          <i class="fa-solid fa-list"></i> 商品リスト
        </h2>
        <span class="text-xs bg-green-100 text-green-800 px-2 py-0.5 rounded-full font-bold">単価 (税込)</span>
      </div>
      <div id="product-list" class="space-y-3">
        <div class="text-center py-8 text-slate-400 text-sm">
          <div class="animate-spin rounded-full h-8 w-8 border-2 border-amber-500 border-t-transparent mx-auto mb-2"></div>
          商品情報を読み込んでいます...
        </div>
      </div>
    </section>
  </div>

  <!-- ===== 注文履歴タブ ===== -->
  <div id="tab-content-history" class="tab-content flex-1 max-w-lg w-full mx-auto px-4 py-6 space-y-4">
    <div id="history-loading" class="text-center py-8 text-slate-400 text-sm">
      <div class="animate-spin rounded-full h-8 w-8 border-2 border-amber-500 border-t-transparent mx-auto mb-2"></div>
      履歴を読み込んでいます...
    </div>
    <div id="history-calendar" class="hidden">
      <!-- 月ナビゲーション -->
      <div class="flex items-center justify-between mb-3">
        <button onclick="changeMonth(-1)" class="w-9 h-9 rounded-full bg-amber-100 text-amber-800 flex items-center justify-center hover:bg-amber-200">
          <i class="fa-solid fa-chevron-left text-sm"></i>
        </button>
        <h2 id="cal-title" class="font-bold text-amber-900 text-base"></h2>
        <button onclick="changeMonth(1)" class="w-9 h-9 rounded-full bg-amber-100 text-amber-800 flex items-center justify-center hover:bg-amber-200">
          <i class="fa-solid fa-chevron-right text-sm"></i>
        </button>
      </div>
      <!-- 曜日ヘッダー -->
      <div class="grid grid-cols-7 mb-1">
        <div class="text-center text-[10px] font-bold text-red-400 py-1">日</div>
        <div class="text-center text-[10px] font-bold text-slate-400 py-1">月</div>
        <div class="text-center text-[10px] font-bold text-slate-400 py-1">火</div>
        <div class="text-center text-[10px] font-bold text-slate-400 py-1">水</div>
        <div class="text-center text-[10px] font-bold text-slate-400 py-1">木</div>
        <div class="text-center text-[10px] font-bold text-slate-400 py-1">金</div>
        <div class="text-center text-[10px] font-bold text-blue-400 py-1">土</div>
      </div>
      <!-- カレンダーグリッド -->
      <div id="cal-grid" class="grid grid-cols-7 gap-1 bg-white rounded-2xl p-3 shadow-sm border border-amber-100"></div>
      <!-- 凡例 -->
      <div class="flex items-center gap-2 mt-2 px-1">
        <div class="w-4 h-4 rounded bg-amber-100 border-2 border-amber-600"></div>
        <span class="text-[10px] text-slate-400">注文あり（タップで詳細）</span>
      </div>
    </div>
    <div id="history-empty" class="hidden text-center py-8 text-slate-400 text-sm">
      <i class="fa-solid fa-box-open text-2xl mb-2 block"></i>
      まだ注文履歴がありません。
    </div>
  </div>

  <!-- フッター（発注タブのみ表示） -->
  <footer id="order-footer" class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 shadow-[0_-4px_12px_rgba(0,0,0,0.05)] px-4 py-3 z-40">
    <div class="max-w-lg mx-auto flex items-center justify-between gap-4">
      <div>
        <p class="text-[10px] text-slate-400 font-bold">合計点数: <span id="total-count">0</span> 点</p>
        <p class="text-amber-800 font-black text-xl">¥<span id="total-price">0</span></p>
      </div>
      <button onclick="submitOrder()" id="submit-btn"
        class="flex-1 bg-amber-600 text-white font-bold py-3.5 px-4 rounded-xl shadow-md hover:bg-amber-700 active:scale-[0.98] transition-all flex items-center justify-center gap-2 text-sm">
        <i class="fa-solid fa-paper-plane"></i> この内容で発注する
      </button>
    </div>
  </footer>

  <!-- モーダル -->
  <div id="custom-modal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 hidden">
    <div class="bg-white rounded-2xl max-w-sm w-full p-6 text-center space-y-4 shadow-xl">
      <div id="modal-icon" class="text-4xl text-amber-600"><i class="fa-solid fa-circle-info"></i></div>
      <h3 id="modal-title" class="font-bold text-lg text-slate-800">確認</h3>
      <p id="modal-message" class="text-sm text-slate-500 whitespace-pre-line text-left"></p>
      <div class="flex gap-3 pt-2">
        <button id="modal-cancel-btn" onclick="closeModal()"
          class="flex-1 py-2.5 rounded-xl border border-slate-200 text-sm font-semibold text-slate-600 bg-slate-50 hover:bg-slate-100 hidden">閉じる</button>
        <button id="modal-ok-btn" onclick="closeModal()"
          class="flex-1 py-2.5 rounded-xl bg-amber-600 text-white text-sm font-bold hover:bg-amber-700 shadow-sm">OK</button>
      </div>
    </div>
  </div>

  <!-- 履歴詳細モーダル -->
  <div id="history-modal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 hidden">
    <div class="bg-white rounded-2xl max-w-sm w-full p-6 space-y-4 shadow-xl">
      <div class="flex items-center justify-between">
        <h3 id="hmodal-title" class="font-bold text-base text-amber-900"></h3>
        <button onclick="closeHistoryModal()" class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-slate-500 hover:bg-slate-200">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <div id="hmodal-body" class="space-y-2 text-sm text-slate-700"></div>
    </div>
  </div>

  <div id="loading-spinner" class="fixed inset-0 bg-black/60 z-50 flex flex-col items-center justify-center text-white space-y-4 hidden">
    <div class="animate-spin rounded-full h-12 w-12 border-4 border-amber-500 border-t-transparent"></div>
    <p class="text-sm font-bold tracking-wider">データを送信中...</p>
  </div>

  <script>
    const LIFF_ID         = "2010395299-6xRjcACT";
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzik00tJnW0jCTpXK1Q_3T5N2L4DOFhi1j6hVge5VZ1e3-D68k9PnU4YHh5ehh_scTC6Q/exec";

    let userProfile = { userId: "test_local_user", displayName: "テストユーザー" };
    let shopCode    = "";
    let shopName    = "";
    let products    = [];
    let cart        = {};
    let historyData = [];
    let calYear     = new Date().getFullYear();
    let calMonth    = new Date().getMonth(); // 0-indexed

    // ============================================================
    //  タブ切り替え
    // ============================================================
    function switchTab(tab) {
      ["order", "history"].forEach(t => {
        document.getElementById("tab-content-" + t).classList.toggle("active", t === tab);
        const btn = document.getElementById("tab-" + t);
        btn.classList.toggle("text-amber-200", t === tab);
        btn.classList.toggle("border-amber-300", t === tab);
        btn.classList.toggle("text-amber-400", t !== tab);
        btn.classList.toggle("border-transparent", t !== tab);
      });
      document.getElementById("order-footer").style.display = tab === "order" ? "" : "none";

      if (tab === "history" && historyData.length === 0) {
        loadHistory();
      }
    }

    // ============================================================
    //  初期化
    // ============================================================
    window.onload = function () {
      setupDeliveryDate();
      initLiff();
    };

    function setupDeliveryDate() {
      const deliveryInput = document.getElementById('delivery-date');
      const minDate       = new Date();
      const currentHour   = minDate.getHours();
      minDate.setDate(minDate.getDate() + (currentHour >= 18 ? 4 : 3));
      const yyyy = minDate.getFullYear();
      const mm   = String(minDate.getMonth() + 1).padStart(2, '0');
      const dd   = String(minDate.getDate()).padStart(2, '0');
      deliveryInput.min   = `${yyyy}-${mm}-${dd}`;
      deliveryInput.value = `${yyyy}-${mm}-${dd}`;
      updateDayOfWeek();
    }

    function updateDayOfWeek() {
      const days = ["（日）", "（月）", "（火）", "（水）", "（木）", "（金）", "（土）"];
      const val  = document.getElementById('delivery-date').value;
      if (!val) return;
      const d = new Date(val + "T00:00:00");
      document.getElementById('day-of-week').innerText = days[d.getDay()];
    }

    // ============================================================
    //  URLから店舗コードを取得
    // ============================================================
    function _getShopCodeFromUrl() {
      const urlParams = new URLSearchParams(window.location.search);
      let code = urlParams.get('shop') || "";
      if (!code) {
        const liffState = urlParams.get('liff.state') || "";
        if (liffState) {
          try {
            const decoded1    = decodeURIComponent(liffState);
            const stateParams = new URLSearchParams(decoded1);
            code = stateParams.get('shop') || "";
            if (!code) {
              const match = decoded1.match(/[?&]shop=([^&]*)/);
              if (match) code = decodeURIComponent(match[1]);
            }
          } catch (e) { console.warn("liff.stateのパースエラー:", e); }
        }
      }
      return code;
    }

    // ============================================================
    //  LIFF初期化
    // ============================================================
    function initLiff() {
      liff.init({ liffId: LIFF_ID })
        .then(() => {
          shopCode = _getShopCodeFromUrl();
          if (!shopCode) {
            document.getElementById('product-list').innerHTML = `
              <div class="text-center py-8 text-red-400 text-sm space-y-2">
                <i class="fa-solid fa-triangle-exclamation text-2xl"></i>
                <p>URLに店舗コードが指定されていません。</p>
              </div>`;
            document.getElementById('user-name').innerText = "URLエラー";
            return;
          }
          liff.getProfile()
            .then(profile => {
              userProfile = { userId: profile.userId, displayName: profile.displayName, pictureUrl: profile.pictureUrl || null };
              document.getElementById('user-name').innerText = profile.displayName;
              if (profile.pictureUrl) document.getElementById('user-avatar').src = profile.pictureUrl;
              loadProducts();
            })
            .catch(err => {
              if (!liff.isLoggedIn()) liff.login();
              else loadProducts();
            });
        })
        .catch(err => {
          shopCode = _getShopCodeFromUrl();
          if (shopCode) loadProducts();
        });
    }

    // ============================================================
    //  商品リスト取得
    // ============================================================
    async function loadProducts() {
      try {
        const url  = `${GAS_WEB_APP_URL}?action=getProducts&shopCode=${encodeURIComponent(shopCode)}&userId=${encodeURIComponent(userProfile.userId)}`;
        const data = await (await fetch(url, { method: 'GET', redirect: 'follow' })).json();
        if (data.status !== "success") throw new Error(data.message || "商品データの取得に失敗しました。");

        shopName = data.shopName || shopCode;
        document.getElementById('shop-name').innerText = shopName;

        products = data.products.map((p, i) => {
          let emoji = "🍞", desc = "卸専用商品";
          if (p.name.includes("クロワッサン"))    { emoji = "🥐"; desc = "香り高い発酵バター使用"; }
          else if (p.name.includes("塩パン"))     { emoji = "🥯"; desc = "外はカリッと中はジュワッと"; }
          else if (p.name.includes("メロンパン")) { emoji = "🍪"; desc = "サクサク食感が自慢"; }
          return { id: p.code || "p"+i, name: p.name, priceExTax: Number(p.priceExTax), priceInTax: Number(p.priceInTax), emoji, desc };
        });
        renderProducts();
      } catch (error) {
        document.getElementById('product-list').innerHTML = `
          <div class="text-center py-8 text-red-400 text-sm space-y-2">
            <i class="fa-solid fa-triangle-exclamation text-2xl"></i>
            <p>商品情報を読み込めませんでした。</p>
            <p class="text-xs text-slate-400">${error.message}</p>
            <button onclick="loadProducts()" class="mt-2 px-4 py-2 bg-amber-600 text-white rounded-xl text-xs font-bold">再読み込み</button>
          </div>`;
      }
    }

    // ============================================================
    //  注文履歴取得
    // ============================================================
    async function loadHistory() {
      document.getElementById('history-loading').classList.remove('hidden');
      document.getElementById('history-calendar').classList.add('hidden');
      document.getElementById('history-empty').classList.add('hidden');
      try {
        const url  = `${GAS_WEB_APP_URL}?action=getHistory&shopCode=${encodeURIComponent(shopCode)}&userId=${encodeURIComponent(userProfile.userId)}`;
        const data = await (await fetch(url, { method: 'GET', redirect: 'follow' })).json();
        if (data.status !== "success") throw new Error(data.message);

        historyData = data.history || [];
        document.getElementById('history-loading').classList.add('hidden');

        if (historyData.length === 0) {
          document.getElementById('history-empty').classList.remove('hidden');
        } else {
          document.getElementById('history-calendar').classList.remove('hidden');
          renderCalendar();
        }
      } catch (error) {
        document.getElementById('history-loading').innerHTML = `
          <div class="text-center py-8 text-red-400 text-sm">
            <i class="fa-solid fa-triangle-exclamation text-2xl mb-2 block"></i>
            <p>履歴を読み込めませんでした。</p>
            <button onclick="loadHistory()" class="mt-2 px-4 py-2 bg-amber-600 text-white rounded-xl text-xs font-bold">再読み込み</button>
          </div>`;
      }
    }

    // ============================================================
    //  カレンダー描画
    // ============================================================
    function renderCalendar() {
      const DAYS_JP = ["（日）","（月）","（火）","（水）","（木）","（金）","（土）"];
      document.getElementById('cal-title').innerText = `${calYear}年 ${calMonth + 1}月`;

      // この月に注文がある日のSetを作る
      const orderDates = new Set(historyData.map(h => h.deliveryDate));

      const grid    = document.getElementById('cal-grid');
      grid.innerHTML = "";

      const firstDay = new Date(calYear, calMonth, 1).getDay(); // 月初の曜日
      const lastDate = new Date(calYear, calMonth + 1, 0).getDate(); // 月末日
      const today    = new Date();
      const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,"0")}-${String(today.getDate()).padStart(2,"0")}`;

      // 前月の空白
      for (let i = 0; i < firstDay; i++) {
        const blank = document.createElement('div');
        blank.className = "cal-day other-month rounded-lg py-2 text-center text-xs";
        grid.appendChild(blank);
      }

      // 日付セル
      for (let d = 1; d <= lastDate; d++) {
        const dateStr = `${calYear}-${String(calMonth+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
        const hasOrder = orderDates.has(dateStr);
        const isToday  = dateStr === todayStr;
        const dow      = new Date(calYear, calMonth, d).getDay();

        const cell = document.createElement('div');
        cell.className = [
          "cal-day rounded-lg py-2 text-center text-xs transition-all",
          hasOrder ? "has-order" : "bg-white",
          isToday  ? "today" : "",
          dow === 0 ? "text-red-400" : dow === 6 ? "text-blue-400" : ""
        ].join(" ");

        cell.innerHTML = hasOrder
          ? `<span class="block">${d}</span><span class="text-[8px]">🍞</span>`
          : `<span class="block">${d}</span>`;

        if (hasOrder) {
          cell.addEventListener('click', () => showHistoryDetail(dateStr));
        }
        grid.appendChild(cell);
      }
    }

    function changeMonth(delta) {
      calMonth += delta;
      if (calMonth < 0)  { calMonth = 11; calYear--; }
      if (calMonth > 11) { calMonth = 0;  calYear++; }
      renderCalendar();
    }

    // ============================================================
    //  履歴詳細モーダル
    // ============================================================
    function showHistoryDetail(dateStr) {
      const DAYS_JP = ["（日）","（月）","（火）","（水）","（木）","（金）","（土）"];
      const d       = new Date(dateStr + "T00:00:00");
      const dayLabel = DAYS_JP[d.getDay()];
      const record  = historyData.find(h => h.deliveryDate === dateStr);
      if (!record) return;

      document.getElementById('hmodal-title').innerText = `納品日: ${dateStr}${dayLabel}`;

      let totalExTax = 0;
      let bodyHtml = `<div class="space-y-2">`;
      record.items.forEach(item => {
        const subtotal = item.price * item.quantity;
        totalExTax += subtotal;
        bodyHtml += `
          <div class="flex justify-between items-center py-1.5 border-b border-slate-100">
            <span class="text-slate-700">${item.name}</span>
            <span class="font-bold text-slate-800">× ${item.quantity}個</span>
          </div>`;
      });

      const tax      = Math.floor(totalExTax * 0.08);
      const totalInTax = totalExTax + tax;

      bodyHtml += `</div>
        <div class="mt-3 pt-3 border-t border-amber-100 text-xs text-slate-500 space-y-0.5">
          <div class="flex justify-between"><span>税抜合計</span><span>¥${totalExTax.toLocaleString()}</span></div>
          <div class="flex justify-between"><span>消費税(8%)</span><span>¥${tax.toLocaleString()}</span></div>
          <div class="flex justify-between font-bold text-amber-800 text-sm mt-1"><span>税込合計</span><span>¥${totalInTax.toLocaleString()}</span></div>
        </div>`;

      if (record.notes) {
        bodyHtml += `<div class="mt-2 text-xs text-slate-400"><i class="fa-solid fa-note-sticky mr-1"></i>${record.notes}</div>`;
      }

      document.getElementById('hmodal-body').innerHTML = bodyHtml;
      document.getElementById('history-modal').classList.remove('hidden');
    }

    function closeHistoryModal() {
      document.getElementById('history-modal').classList.add('hidden');
    }

    // ============================================================
    //  商品カード描画
    // ============================================================
    function renderProducts() {
      const listContainer = document.getElementById('product-list');
      listContainer.innerHTML = '';
      if (products.length === 0) {
        listContainer.innerHTML = '<div class="text-center py-8 text-slate-400 text-sm">この店舗の商品マスタに登録がありません。</div>';
        return;
      }
      products.forEach(p => {
        const qty = cart[p.id] || 0;
        listContainer.insertAdjacentHTML('beforeend', `
          <div class="product-card bg-white p-3.5 rounded-2xl shadow-sm border border-slate-100 flex gap-4 items-center">
            <div class="w-16 h-16 rounded-xl bg-amber-100 flex items-center justify-center shrink-0">
              <span class="text-3xl">${p.emoji}</span>
            </div>
            <div class="flex-1 min-w-0">
              <h3 class="font-bold text-slate-800 text-sm truncate">${p.name}</h3>
              <p class="text-xs text-slate-400 mt-0.5">${p.desc}</p>
              <div class="text-amber-700 font-bold text-sm mt-2">
                ¥${p.priceInTax.toLocaleString()} <span class="text-[10px] text-slate-400 font-normal">/ 個 (税込)</span>
                <p class="text-[10px] text-slate-400 font-normal mt-0.5">税抜 ¥${p.priceExTax.toLocaleString()}</p>
              </div>
            </div>
            <div class="flex items-center gap-2 shrink-0">
              <button onclick="changeQty('${p.id}', -1)" class="w-8 h-8 rounded-full bg-slate-100 text-slate-600 font-bold flex items-center justify-center hover:bg-slate-200 active:scale-95 transition-all">
                <i class="fa-solid fa-minus text-xs"></i>
              </button>
              <span id="qty-${p.id}" class="w-6 text-center font-bold text-sm">${qty}</span>
              <button onclick="changeQty('${p.id}', 1)" class="w-8 h-8 rounded-full bg-amber-100 text-amber-800 font-bold flex items-center justify-center hover:bg-amber-200 active:scale-95 transition-all">
                <i class="fa-solid fa-plus text-xs"></i>
              </button>
            </div>
          </div>`);
      });
    }

    function changeQty(productId, amount) {
      if (!cart[productId]) cart[productId] = 0;
      cart[productId] = Math.max(0, cart[productId] + amount);
      document.getElementById(`qty-${productId}`).innerText = cart[productId];
      calculateTotal();
    }

    function calculateTotal() {
      let totalExTax = 0, totalCount = 0;
      products.forEach(p => {
        const qty = cart[p.id] || 0;
        totalCount += qty;
        totalExTax += qty * p.priceExTax;
      });
      const tax = Math.floor(totalExTax * 0.08);
      const totalInTax = totalExTax + tax;
      document.getElementById('total-count').innerText = totalCount;
      document.getElementById('total-price').innerHTML = `
        ${totalInTax.toLocaleString()} <span class="text-xs text-slate-400 font-normal">(税込)</span>
        <span class="text-[10px] text-slate-400 font-normal block leading-tight mt-0.5">(税抜 ¥${totalExTax.toLocaleString()} + 消費税 ¥${tax.toLocaleString()})</span>`;
    }

    // ============================================================
    //  モーダル
    // ============================================================
    function showModal(title, message, type = "info", showCancel = false) {
      const iconMap = {
        success: { cls: "text-4xl text-green-500",  html: '<i class="fa-solid fa-circle-check"></i>' },
        error:   { cls: "text-4xl text-red-500",    html: '<i class="fa-solid fa-triangle-exclamation"></i>' },
        confirm: { cls: "text-4xl text-amber-500",  html: '<i class="fa-solid fa-circle-question"></i>' },
        info:    { cls: "text-4xl text-amber-600",  html: '<i class="fa-solid fa-circle-info"></i>' }
      };
      const icon = iconMap[type] || iconMap.info;
      document.getElementById('modal-icon').className  = icon.cls;
      document.getElementById('modal-icon').innerHTML  = icon.html;
      document.getElementById('modal-title').innerText = title;
      document.getElementById('modal-message').innerText = message;
      document.getElementById('modal-cancel-btn').classList.toggle('hidden', !showCancel);
      _resetOkBtn(() => closeModal());
      document.getElementById('custom-modal').classList.remove('hidden');
    }

    function closeModal() { document.getElementById('custom-modal').classList.add('hidden'); }

    function _resetOkBtn(handler) {
      const old = document.getElementById('modal-ok-btn');
      const newBtn = old.cloneNode(true);
      old.parentNode.replaceChild(newBtn, old);
      newBtn.addEventListener('click', handler);
    }

    // ============================================================
    //  発注処理
    // ============================================================
    function submitOrder() {
      const deliveryDate = document.getElementById('delivery-date').value;
      const notes        = document.getElementById('notes').value;
      if (!deliveryDate) { showModal("入力エラー", "納品希望日を選択してください。", "error"); return; }

      const orderItems = [];
      let totalExTax   = 0;
      products.forEach(p => {
        const qty = cart[p.id] || 0;
        if (qty > 0) {
          const subtotalExTax = p.priceExTax * qty;
          orderItems.push({ productId: p.id, productName: p.name, price: p.priceExTax, quantity: qty, subtotal: subtotalExTax });
          totalExTax += subtotalExTax;
        }
      });
      if (orderItems.length === 0) { showModal("入力エラー", "商品が選択されていません。", "error"); return; }

      const tax        = Math.floor(totalExTax * 0.08);
      const totalInTax = totalExTax + tax;

      let confirmMessage = `店舗名: ${shopName}\n納品希望日: ${deliveryDate}\n\n【ご注文内容】\n`;
      orderItems.forEach(item => {
        confirmMessage += `・${item.productName} × ${item.quantity}個 (税込¥${Math.floor(item.price * 1.08).toLocaleString()} / 個)\n`;
      });
      confirmMessage += `\n税抜合計: ¥${totalExTax.toLocaleString()}\n消費税(8%): ¥${tax.toLocaleString()}\n税込合計: ¥${totalInTax.toLocaleString()}\n\nこの内容で発注してよろしいですか？`;

      document.getElementById('modal-icon').className  = "text-4xl text-amber-500";
      document.getElementById('modal-icon').innerHTML  = '<i class="fa-solid fa-circle-question"></i>';
      document.getElementById('modal-title').innerText = "発注確認";
      document.getElementById('modal-message').innerText = confirmMessage;
      document.getElementById('modal-cancel-btn').classList.remove('hidden');
      _resetOkBtn(() => { closeModal(); sendDataToGas(deliveryDate, notes, orderItems, totalInTax); });
      document.getElementById('custom-modal').classList.remove('hidden');
    }

    // ============================================================
    //  GASへのデータ送信
    // ============================================================
    async function sendDataToGas(deliveryDate, notes, items, grandTotal) {
      const spinner = document.getElementById('loading-spinner');
      spinner.classList.remove('hidden');

      const url = GAS_WEB_APP_URL
        + "?action=submitOrder"
        + "&shopCode="     + encodeURIComponent(shopCode)
        + "&userId="       + encodeURIComponent(userProfile.userId)
        + "&deliveryDate=" + encodeURIComponent(deliveryDate)
        + "&notes="        + encodeURIComponent(notes)
        + "&items="        + encodeURIComponent(JSON.stringify(items))
        + "&totalPrice="   + encodeURIComponent(grandTotal);

      const maxRetries = 3;
      let delay = 1500;

      for (let attempt = 1; attempt <= maxRetries; attempt++) {
        try {
          const data = await (await fetch(url, { method: 'GET', redirect: 'follow' })).json();
          if (data.status !== "success") throw new Error(data.message || "サーバーエラーが発生しました。");

          if (liff.isInClient()) {
            let lineMsg = `【卸発注が完了しました】\n注文店舗: ${data.shopName}様\n納品希望日: ${deliveryDate}\n発注番号: ${data.orderId}\n\n【注文内訳】\n`;
            items.forEach(item => {
              lineMsg += `・${item.productName} × ${item.quantity}個 (税込¥${Math.floor(item.price * 1.08).toLocaleString()})\n`;
            });
            lineMsg += `\n税込合計金額: ¥${grandTotal.toLocaleString()}\n`;
            if (notes) lineMsg += `備考: ${notes}\n`;
            try { await liff.sendMessages([{ type: 'text', text: lineMsg }]); } catch (le) { console.warn("LINE送信スキップ:", le); }
          }

          // 履歴キャッシュをリセット（次回タブ切替で再取得）
          historyData = [];

          spinner.classList.add('hidden');
          showModal("発注完了 ✅", `発注番号: ${data.orderId}\n店舗名: ${data.shopName}様\n\nご注文を受け付けました！\nLINEグループに明細を投稿しました。`, "success");
          _resetOkBtn(() => { closeModal(); location.reload(); });
          return;

        } catch (error) {
          if (attempt === maxRetries) {
            spinner.classList.add('hidden');
            showModal("送信エラー", `送信に失敗しました。\n\n${error.message}\n\n電波の良い場所で再度お試しください。`, "error");
            return;
          }
          await new Promise(resolve => setTimeout(resolve, delay));
          delay *= 2;
        }
      }
    }
  </script>
</body>
